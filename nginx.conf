server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # MIME / charset
  charset utf-8;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Long cache for immutable assets (SVGs, images, fonts)
  location ~* \.(svg|woff2|woff|ttf|otf|jpg|jpeg|png|webp|gif|ico|avif)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Short cache for code (so updates land quickly)
  location ~* \.(css|js)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
    try_files $uri =404;
  }

  # HTML — no aggressive cache (the entry point)
  location = / {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files /index.html =404;
  }

  # Single-page fallback (hash-routed case studies — harmless safety net)
  location / {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri $uri/ /index.html;
  }

  # 404 — fall back to the same shell
  error_page 404 = /index.html;
}
